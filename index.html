<!DOCTYPE html>
<html>
<head>
<title>Adaptive Authentication</title>
</head>
<body>
<!-- ================= MAIN MENU ================= -->
<div id="menu">
    <h2>Adaptive Authentication</h2>
    <button onclick="showRegister()">Register</button>
    <button onclick="showLogin()">Login</button>
</div>
<!-- ================= REGISTER ================= -->
<div id="registerSection" style="display:none;">
    <h2>Register</h2>
    <input id="reg_email" placeholder="Email"><br><br>
    <input id="reg_username" placeholder="Username"><br><br>
    <input id="reg_password" type="password" placeholder="Password"><br><br>
    <button onclick="register()">Register</button>
    <br><br>
    <button onclick="goHome()">Back to Main Menu</button>
</div>
<!-- ================= LOGIN ================= -->
<div id="loginSection" style="display:none;">
    <h2>Login</h2>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <div id="otpBox" style="display:none;">
        <h3>Enter OTP</h3>
        <input id="otp" placeholder="OTP">
        <button onclick="verifyOTP()">Verify OTP</button>
    </div>
    <br>
    <button onclick="goHome()">Back to Main Menu</button>
</div>
<p id="result"></p>
<script>
const API = "https://bayesian-new.onrender.com";
let mouseData = [];
let sessionId = null;
/* ================= MOUSE TRACKING ================= */
document.addEventListener("mousemove", e => {
    mouseData.push({
        x: e.clientX,
        y: e.clientY,
        t: Date.now()
    });
    if (mouseData.length > 200)
        mouseData.shift();
});
/* ================= NAVIGATION ================= */
function showRegister() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("registerSection").style.display = "block";
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("result").innerText = "";
}
function showLogin() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("registerSection").style.display = "none";
    document.getElementById("result").innerText = "";
}
function goHome() {
    sessionId = null;
    localStorage.removeItem("session_token");
    localStorage.removeItem("user_email");
    document.getElementById("menu").style.display = "block";
    document.getElementById("registerSection").style.display = "none";
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("otpBox").style.display = "none";
    document.getElementById("otp").value = "";
    document.getElementById("result").innerText = "";
}
/* ================= REGISTER ================= */
async function register() {
    const email = document.getElementById("reg_email").value.trim();
    const username = document.getElementById("reg_username").value.trim();
    const password = document.getElementById("reg_password").value;
    if (!email || !username || !password) {
        document.getElementById("result").innerText = "Please fill in all fields.";
        return;
    }
    try {
        const response = await fetch(`${API}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, username, password })
        });
        const data = await response.json();

        if (data.message === "User Registered Successfully") {
            document.getElementById("result").innerText = "✅ Registered successfully! You can now login.";
        } else if (data.message === "EMAIL_ALREADY_EXISTS") {
            document.getElementById("result").innerText = "❌ Email already registered.";
        } else {
            document.getElementById("result").innerText = data.message;
        }
    } catch (err) {
        document.getElementById("result").innerText = "❌ Network error: " + err.message;
    }
}

/* ================= LOGIN ================= */
async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        document.getElementById("result").innerText = "Please enter email and password.";
        return;
    }

    document.getElementById("result").innerText = "Locating...";

    // FIX: gracefully handle geolocation denial
    const getPosition = () => new Promise((resolve) => {
        if (!navigator.geolocation) {
            resolve({ latitude: 0.0, longitude: 0.0 });
            return;
        }
        navigator.geolocation.getCurrentPosition(
            pos => resolve({
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude
            }),
            () => resolve({ latitude: 0.0, longitude: 0.0 }) // denied → default
        );
    });

    const { latitude, longitude } = await getPosition();

    try {
        document.getElementById("result").innerText = "Logging in...";

        const response = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, latitude, longitude, mouse: mouseData })
        });
        const data = await response.json();

        if (data.decision === "ENTER_OTP") {
            sessionId = data.session_id;
            document.getElementById("otpBox").style.display = "block";
            document.getElementById("result").innerText = "📧 OTP sent to your email.";
        } else if (data.decision === "WRONG_PASSWORD") {
            document.getElementById("result").innerText = "❌ Wrong password.";
        } else if (data.decision === "USER_NOT_FOUND") {
            document.getElementById("result").innerText = "❌ User not found.";
        } else {
            document.getElementById("result").innerText = data.decision;
        }
    } catch (err) {
        document.getElementById("result").innerText = "❌ Network error: " + err.message;
    }
}

/* ================= OTP VERIFY ================= */
async function verifyOTP() {
    const email = document.getElementById("email").value.trim();
    const otp = document.getElementById("otp").value.trim();

    if (!otp) {
        document.getElementById("result").innerText = "Please enter the OTP.";
        return;
    }

    if (!sessionId) {
        document.getElementById("result").innerText = "Session lost. Please login again.";
        return;
    }

    try {
        const response = await fetch(`${API}/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp, session_id: sessionId })
        });
        const data = await response.json();

        if (data.session_token) {
            // Store token for future authenticated requests
            localStorage.setItem("session_token", data.session_token);
            localStorage.setItem("user_email", email);

            if (data.message === "ALLOW") {
                document.getElementById("result").innerText =
                    "✅ Login Successful\nConfidence: " + Number(data.confidence).toFixed(3);
            } else if (data.message === "MONITOR") {
                document.getElementById("result").innerText =
                    "⚠️ Login Allowed (monitored)\nConfidence: " + Number(data.confidence).toFixed(3);
            }
        } else if (data.message === "BLOCK") {
            document.getElementById("result").innerText =
                "🚫 Access Denied\nConfidence too low: " + Number(data.confidence).toFixed(3);
        } else if (data.status === "SESSION_EXPIRED") {
            document.getElementById("result").innerText = "⏰ Session expired. Please login again.";
            document.getElementById("otpBox").style.display = "none";
            sessionId = null;
        } else if (data.status === "OTP_FAILED") {
            document.getElementById("result").innerText = "❌ Incorrect OTP. Please try again.";
        } else {
            document.getElementById("result").innerText = "❌ Something went wrong.";
        }
    } catch (err) {
        document.getElementById("result").innerText = "❌ Network error: " + err.message;
    }
}
</script>
</body>
</html>
