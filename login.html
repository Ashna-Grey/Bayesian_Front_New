<!DOCTYPE html>
<html>
<head>
<title>Adaptive Authentication</title>
</head>
<body>
<!-- ================= MAIN MENU ================= -->
<div id="menu">
    <h2>Adaptive Authentication</h2>
    <button onclick="showRegister()">Register</button>
    <button onclick="showLogin()">Login</button>
</div>
<!-- ================= REGISTER ================= -->
<div id="registerSection" style="display:none;">
    <h2>Register</h2>
    <input id="reg_email" placeholder="Email"><br><br>
    <input id="reg_username" placeholder="Username"><br><br>
    <input id="reg_password" type="password" placeholder="Password"><br><br>
    <button onclick="register()">Register</button>
    <br><br>
    <button onclick="goHome()">Back to Main Menu</button>
</div>
<!-- ================= LOGIN ================= -->
<div id="loginSection" style="display:none;">
    <h2>Login</h2>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <div id="otpBox" style="display:none;">
        <h3>Enter OTP</h3>
        <input id="otp" placeholder="OTP">
        <button onclick="verifyOTP()">Verify OTP</button>
    </div>
    <br>
    <button onclick="goHome()">Back to Main Menu</button>
</div>
<p id="result"></p>
<script>
const API = "https://bayesian-new.onrender.com";
let mouseData = [];
/* ================= MOUSE TRACKING ================= */
document.addEventListener("mousemove", e => {
    mouseData.push({
        x:e.clientX,
        y:e.clientY,
        t:Date.now()
    });
    if(mouseData.length>200)
        mouseData.shift();
});
/* ================= NAVIGATION ================= */
function showRegister(){
    document.getElementById("menu").style.display="none";
    document.getElementById("registerSection").style.display="block";
    document.getElementById("loginSection").style.display="none";
    document.getElementById("result").innerText="";
}
function showLogin(){
    document.getElementById("menu").style.display="none";
    document.getElementById("loginSection").style.display="block";
    document.getElementById("registerSection").style.display="none";
    document.getElementById("result").innerText="";
}
function goHome(){
    document.getElementById("menu").style.display="block";
    document.getElementById("registerSection").style.display="none";
    document.getElementById("loginSection").style.display="none";
    document.getElementById("otpBox").style.display="none";
    document.getElementById("result").innerText="";
}
/* ================= REGISTER ================= */
async function register(){
const response = await fetch(`${API}/register`, {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
email:document.getElementById("reg_email").value,
username:document.getElementById("reg_username").value,
password:document.getElementById("reg_password").value
})
});
const data = await response.json();
document.getElementById("result").innerText = data.message;
}
/* ================= LOGIN ================= */
async function login(){
if(!navigator.geolocation){
alert("Location not supported");
return;
}
navigator.geolocation.getCurrentPosition(
async position => {
const response = await fetch(`${API}/login`, {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
email:document.getElementById("email").value,
password:document.getElementById("password").value,
latitude:position.coords.latitude,
longitude:position.coords.longitude,
mouse:mouseData
})
});
const data = await response.json();
if(data.decision==="ENTER_OTP"){
document.getElementById("otpBox").style.display="block";
document.getElementById("result").innerText="OTP sent to email";
}
});
}
/* ================= OTP VERIFY ================= */
async function verifyOTP(){
const response = await fetch(`${API}/verify-otp`, {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
email:document.getElementById("email").value,
otp:document.getElementById("otp").value
})
});
const data = await response.json();
if(data.confidence!==undefined){
document.getElementById("result").innerText =
"✅ Login Successful\nConfidence: "
+ Number(data.confidence).toFixed(3);
}
else{
document.getElementById("result").innerText="OTP Failed";
}
}
</script>
</body>
</html>
